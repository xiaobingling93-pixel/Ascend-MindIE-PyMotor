[pytest]
testpaths = tests
python_files = test_*.py
python_classes = Test*
python_functions = test_*
addopts = -v
log_cli = true
log_cli_level = INFO
asyncio_mode = auto
markers =
    integration: marks tests as integration tests (deselect with '-m "not integration"')

[coverage:run]
source = motor
branch = True
omit = 
    */test_*.py
    */conftest.py
    setup.py

[coverage:report]
exclude_lines =
    pragma: no cover
    def __repr__
    raise NotImplementedError
    if __name__ == .__main__.:
    pass
    raise ImportError